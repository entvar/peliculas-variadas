<!DOCTYPE html><html><head><title>Películas</title><style>:root{--p:#ff0a16;--s:#1a1a1a;--t:#e0e0e0}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0d0d0d;color:#e0e0e0}.container{max-width:1200px;margin:0 auto;padding:20px}h1{color:#fff;text-align:center;margin:20px 0}.posts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}.post-preview{background:#1a1a1a;border-radius:8px;overflow:hidden;transition:.3s}.post-preview:hover{transform:translateY(-3px)}.post-image img{width:100%;height:200px;object-fit:contain;background:#333}.post-content{padding:15px;text-align:center}.post-content h2{margin:10px 0}.post-content a{color:#fff;text-decoration:none}.post-content a:hover{color:#ff0a16}.genre-filter{margin:20px 0;text-align:center}.genre-tag{background:#ff0a16;color:#fff;padding:5px 15px;border-radius:20px;margin:5px;cursor:pointer;display:inline-block}.genre-tag.active{background:#333}.hidden{display:none}</style></head><body><div class="container"><h1>🎬 Películas Variadas</h1><div class="genre-filter"><span class="genre-tag active" data-genre="todos">Todos</span><span class="genre-tag" data-genre="terror">Terror</span></div><div class="posts-grid"><article class="post-preview" data-genres="terror,suspenso"><div class="post-image"><img src="https://repelishd.city/uploads/mini/cuimage/09/f94149e0a01ec3309a04b7eef73a00.jpg" alt="Scream 7"></div><div class="post-content"><h2><a href="/scream-7">Scream 7</a></h2></div></article></div></div><script>document.addEventListener('DOMContentLoaded',function(){const e=document.querySelectorAll('.genre-tag'),t=document.querySelectorAll('.post-preview');e.forEach(n=>{n.addEventListener('click',function(){e.forEach(e=>e.classList.remove('active')),this.classList.add('active');const n=this.dataset.genre;t.forEach(e=>{const t=e.dataset.genres||'';n==='todos'||t.includes(n)?e.classList.remove('hidden'):e.classList.add('hidden')})})});</script></body></html>
